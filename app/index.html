<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps CI/CD Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🚀 DevOps CI/CD Dashboard</h1>

        <p class="subtitle">
            Jenkins • Kubernetes • Terraform • GitHub
        </p>

        <div class="cards">

            <div class="card">
                <h2>⚙ Jenkins</h2>
                <p>Automation Pipeline</p>
            </div>

            <div class="card">
                <h2>☸ Kubernetes</h2>
                <p>Container Orchestration</p>
            </div>

            <div class="card">
                <h2>🌍 Terraform</h2>
                <p>Infrastructure as Code</p>
            </div>

            <div class="card">
                <h2>📂 GitHub</h2>
                <p>Version Control System</p>
            </div>

        </div>

        <div class="pipeline">

            <div class="step">Code</div>
            <div class="arrow">➡</div>

            <div class="step">Build</div>
            <div class="arrow">➡</div>

            <div class="step">Test</div>
            <div class="arrow">➡</div>

            <div class="step">Deploy</div>

        </div>

    </div>

</body>
</html>
